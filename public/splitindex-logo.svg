<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240">
  <!-- SPLIT INDEX — horizontal lockup, dark-background variant.
       Wordmark uses Unbounded; falls back to a heavy grotesque if not installed.
       For production, convert the text to outlines (Object > Expand in Illustrator,
       or Path > Object to Path in Inkscape) so it renders identically everywhere. -->
  <defs>
    <clipPath id="lkLab"><path d="M40 30 H152.5 L104.5 210 H40 Z"/></clipPath>
    <clipPath id="lkEng"><path d="M152.5 30 H220 V210 H104.5 Z"/></clipPath>
    <linearGradient id="lkSeam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3DFF6E"/>
      <stop offset="1" stop-color="#3BA6FF"/>
    </linearGradient>
  </defs>

  <!-- transparent dark canvas assumed; icon carries its own halves -->
  <g clip-path="url(#lkLab)">
    <rect x="40" y="30" width="180" height="180" rx="42" fill="#070908" stroke="#1B241D" stroke-width="2"/>
    <circle cx="130" cy="120" r="48" fill="none" stroke="#3DFF6E" stroke-width="19"/>
  </g>
  <g clip-path="url(#lkEng)">
    <rect x="40" y="30" width="180" height="180" rx="42" fill="#F7FBFF"/>
    <circle cx="130" cy="120" r="48" fill="none" stroke="#3BA6FF" stroke-width="19"/>
  </g>
  <line x1="152.5" y1="26" x2="104.5" y2="214" stroke="url(#lkSeam)" stroke-width="10" opacity=".55"/>
  <line x1="152.5" y1="26" x2="104.5" y2="214" stroke="#FFFFFF" stroke-width="5.5"/>

  <!-- wordmark -->
  <g font-family="Unbounded, 'Arial Black', sans-serif" font-weight="900" font-size="64" letter-spacing="6">
    <text x="264" y="143" fill="#3DFF6E">SPLIT</text>
    <text x="512" y="143" fill="#FFFFFF" opacity=".4" font-weight="500">/</text>
    <text x="556" y="143" fill="#3BA6FF">INDEX</text>
  </g>
  <text x="266" y="182" font-family="'Space Grotesk', Arial, sans-serif" font-size="15" letter-spacing="11" fill="#5E7263">TWO WORLDS · ONE SCORE</text>
</svg>
